openapi: 3.1.1
info:
  title: CDNgine Public API
  version: 1.0.0
  summary: Public asset ingestion, version lookup, delivery, and manifest contract.
  description: |
    Public API surface for product clients and generated SDKs. This contract keeps the
    public lifecycle explicit: create an upload session, complete it, observe version
    state, and authorize source or derivative reads without exposing internal storage
    topology.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
servers:
  - url: https://api.cdngine.local
    description: Local or development control-plane endpoint.
security:
  - bearerAuth: []
tags:
  - name: upload-sessions
    description: Create and complete staged uploads for new assets or new immutable revisions.
  - name: assets
    description: Inspect logical asset identity and version lineage.
  - name: versions
    description: Read explicit lifecycle and processing state for a specific immutable version.
  - name: source-downloads
    description: Authorize original-source reads without exposing internal source repository details.
  - name: derivatives
    description: List deterministic delivery artifacts published for a version.
  - name: manifests
    description: Retrieve manifest-first published outputs for complex assets.
  - name: deliveries
    description: Authorize derivative delivery for a concrete delivery scope.
paths:
  /v1/upload-sessions:
    post:
      tags:
        - upload-sessions
      summary: Create an upload session
      description: |
        Creates a staged upload session for either a new logical asset or a new immutable
        version of an existing asset. Retries with the same idempotency key converge on the
        same session and version intent.
      operationId: createUploadSession
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: ../examples/public/upload-session-create-request.schema.json
            example:
              serviceNamespaceId: media-platform
              tenantId: tenant-acme
              assetId: ast_existing_123
              assetOwner: customer:acme
              source:
                filename: hero-banner.png
                contentType: image/png
              upload:
                objectKey: staging/media-platform/tenant-acme/upl_01JQ9YF8QJCPY9G7B8N1F3K6Z1
                byteLength: 1843921
                checksum:
                  algorithm: sha256
                  value: 4d5f963e5e94932ea4b112fba6f2a5fd49af6e8ed179e67a0d4a4cc2c4f37df5
      responses:
        '201':
          description: Upload session created or converged through idempotency.
          content:
            application/json:
              schema:
                $ref: ../examples/public/upload-session-create-response.schema.json
              example:
                uploadSessionId: upl_01JQ9YF8QJCPY9G7B8N1F3K6Z1
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                isDuplicate: false
                uploadTarget:
                  protocol: tus
                  method: PATCH
                  url: https://uploads.cdngine.local/files/upl_01JQ9YF8QJCPY9G7B8N1F3K6Z1
                  expiresAt: '2026-01-15T18:00:00Z'
                status: awaiting-upload
                links:
                  complete: /v1/upload-sessions/upl_01JQ9YF8QJCPY9G7B8N1F3K6Z1/complete
                  version: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
        '400':
          $ref: '#/components/responses/Problem'
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/upload-sessions/{uploadSessionId}/complete:
    post:
      tags:
        - upload-sessions
      summary: Complete an upload session
      description: |
        Verifies that staged bytes are durably present and requests the canonicalization
        handoff. Successful completion returns the immutable version handle and the
        workflow-dispatch status view instead of pretending processing is synchronous.
      operationId: completeUploadSession
      parameters:
        - $ref: '#/components/parameters/UploadSessionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - stagedObject
              properties:
                stagedObject:
                  type: object
                  additionalProperties: false
                  required:
                    - objectKey
                    - byteLength
                    - checksum
                  properties:
                    objectKey:
                      type: string
                    byteLength:
                      type: integer
                      minimum: 0
                    checksum:
                      type: object
                      additionalProperties: false
                      required:
                        - algorithm
                        - value
                      properties:
                        algorithm:
                          type: string
                          enum:
                            - sha256
                        value:
                          type: string
      responses:
        '202':
          description: Canonicalization accepted and workflow dispatch state exposed.
          content:
            application/json:
              schema:
                $ref: ../examples/public/upload-session-complete-response.schema.json
              example:
                uploadSessionId: upl_01JQ9YF8QJCPY9G7B8N1F3K6Z1
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                versionState: canonical
                workflowDispatch:
                  dispatchId: wd_01JQ9YPAQ5P1M1AR3JGY1X7A4W
                  state: pending
                  workflowKey: media-platform:ast_existing_123:ver_01JQ9YG2PGM4H7QPQY5C8D6BBN:image-derivation-v1
                links:
                  version: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        '410':
          $ref: '#/components/responses/Problem'
        '422':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/assets/{assetId}:
    get:
      tags:
        - assets
      summary: Get a logical asset
      description: |
        Returns logical-asset metadata plus the latest known immutable version reference.
        Asset identity remains stable while versions advance.
      operationId: getAsset
      parameters:
        - $ref: '#/components/parameters/AssetId'
      responses:
        '200':
          description: Logical asset resource.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                required:
                  - assetId
                  - serviceNamespaceId
                  - assetOwner
                  - latestVersion
                  - links
                properties:
                  assetId:
                    type: string
                  serviceNamespaceId:
                    type: string
                  tenantId:
                    type:
                      - string
                      - 'null'
                  assetOwner:
                    type: string
                  latestVersion:
                    $ref: ../examples/public/asset-version.schema.json
                  links:
                    type: object
                    additionalProperties: false
                    required:
                      - self
                    properties:
                      self:
                        type: string
                      latestVersion:
                        type: string
              example:
                assetId: ast_existing_123
                serviceNamespaceId: media-platform
                tenantId: tenant-acme
                assetOwner: customer:acme
                latestVersion:
                  assetId: ast_existing_123
                  versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                  serviceNamespaceId: media-platform
                  tenantId: tenant-acme
                  assetOwner: customer:acme
                  versionNumber: 3
                  lifecycleState: processing
                  workflowState: running
                  source:
                    contentType: image/png
                    filename: hero-banner.png
                    byteLength: 1843921
                  links:
                    self: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                    derivatives: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN/derivatives
                links:
                  self: /v1/assets/ast_existing_123
                  latestVersion: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/assets/{assetId}/versions/{versionId}:
    get:
      tags:
        - versions
      summary: Get an immutable asset version
      description: Returns explicit lifecycle, source, and processing state for one immutable version.
      operationId: getAssetVersion
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Immutable version resource.
          content:
            application/json:
              schema:
                $ref: ../examples/public/asset-version.schema.json
              example:
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                serviceNamespaceId: media-platform
                tenantId: tenant-acme
                assetOwner: customer:acme
                versionNumber: 3
                lifecycleState: published
                workflowState: completed
                source:
                  contentType: image/png
                  filename: hero-banner.png
                  byteLength: 1843921
                links:
                  self: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                  derivatives: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN/derivatives
                  manifest: /v1/assets/ast_existing_123/versions/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN/manifests/image-default
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/assets/{assetId}/versions/{versionId}/source/authorize:
    post:
      tags:
        - source-downloads
      summary: Authorize original-source access
      description: |
        Returns a resolved source-delivery posture such as a temporary export URL, a proxy
        path, or a tightly scoped lazy-read handle for trusted internal clients.
      operationId: authorizeSourceDownload
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/VersionId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                preferredDisposition:
                  type: string
                  enum:
                    - attachment
                    - inline
              example:
                preferredDisposition: attachment
      responses:
        '200':
          description: Authorized original-source read.
          content:
            application/json:
              schema:
                $ref: ../examples/public/source-authorization-response.schema.json
              example:
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                authorizationMode: signed-url
                resolvedOrigin: source-export
                expiresAt: '2026-01-15T18:15:00Z'
                url: https://downloads.cdngine.local/source/exp_01JQ9Z4SZ4SX2Y6V7G4W6J9P2V
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/assets/{assetId}/versions/{versionId}/derivatives:
    get:
      tags:
        - derivatives
      summary: List deterministic derivatives
      description: Lists the currently published deterministic derivatives for a version.
      operationId: listDerivatives
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/VersionId'
      responses:
        '200':
          description: Deterministic derivative set.
          content:
            application/json:
              schema:
                $ref: ../examples/public/derivative-list-response.schema.json
              example:
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                derivatives:
                  - derivativeId: drv_01JQ9ZHWR1PZK8A2NGW0BEM0DJ
                    recipeId: image-default
                    variant: webp-1600
                    contentType: image/webp
                    byteLength: 512334
                    deterministicKey: deriv/media-platform/ast_existing_123/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN/image-default/webp-1600
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/assets/{assetId}/versions/{versionId}/manifests/{manifestType}:
    get:
      tags:
        - manifests
      summary: Get a published manifest
      description: Returns a published manifest for the requested version and manifest type.
      operationId: getManifest
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/VersionId'
        - $ref: '#/components/parameters/ManifestType'
      responses:
        '200':
          description: Published manifest payload.
          content:
            application/json:
              schema:
                $ref: ../examples/public/image-asset-manifest.schema.json
              example:
                schemaVersion: 1.0.0
                manifestType: image-default
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                derivatives:
                  - variant: webp-1600
                    contentType: image/webp
                    deterministicKey: deriv/media-platform/ast_existing_123/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN/image-default/webp-1600
                    width: 1600
                    height: 900
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
  /v1/assets/{assetId}/versions/{versionId}/deliveries/{deliveryScopeId}/authorize:
    post:
      tags:
        - deliveries
      summary: Authorize derivative delivery
      description: |
        Resolves the caller-facing delivery mode for a specific delivery scope without
        requiring the client to understand which cache, bucket, or origin served the result.
      operationId: authorizeDelivery
      parameters:
        - $ref: '#/components/parameters/AssetId'
        - $ref: '#/components/parameters/VersionId'
        - $ref: '#/components/parameters/DeliveryScopeId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                variant:
                  type: string
                responseFormat:
                  type: string
                  enum:
                    - url
                    - cookie-bundle
              example:
                variant: webp-1600
                responseFormat: url
      responses:
        '200':
          description: Authorized derivative delivery.
          content:
            application/json:
              schema:
                $ref: ../examples/public/delivery-authorization-response.schema.json
              example:
                assetId: ast_existing_123
                versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
                deliveryScopeId: public-images
                authorizationMode: signed-url
                resolvedOrigin: cdn-derived
                expiresAt: '2026-01-15T18:30:00Z'
                url: https://cdn.cdngine.local/i/public-images/ast_existing_123/ver_01JQ9YG2PGM4H7QPQY5C8D6BBN/webp-1600
        '401':
          $ref: '#/components/responses/Problem'
        '403':
          $ref: '#/components/responses/Problem'
        '404':
          $ref: '#/components/responses/Problem'
        '409':
          $ref: '#/components/responses/Problem'
        default:
          $ref: '#/components/responses/Problem'
components:
  parameters:
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      description: Stable caller-supplied key used to deduplicate mutating requests.
      schema:
        type: string
        minLength: 8
        maxLength: 256
    UploadSessionId:
      name: uploadSessionId
      in: path
      required: true
      description: Durable identifier for the staged upload session.
      schema:
        type: string
    AssetId:
      name: assetId
      in: path
      required: true
      description: Stable logical asset identifier.
      schema:
        type: string
    VersionId:
      name: versionId
      in: path
      required: true
      description: Immutable asset-version identifier.
      schema:
        type: string
    ManifestType:
      name: manifestType
      in: path
      required: true
      description: Published manifest family for the version.
      schema:
        type: string
    DeliveryScopeId:
      name: deliveryScopeId
      in: path
      required: true
      description: Delivery policy scope that resolves the public delivery posture.
      schema:
        type: string
  responses:
    Problem:
      description: RFC 9457 problem detail.
      content:
        application/problem+json:
          schema:
            $ref: ../examples/public/problem-detail.schema.json
          example:
            type: https://docs.cdngine.dev/problems/version-not-ready
            title: Version not ready
            status: 409
            detail: Requested derivatives are not yet published for this immutable version.
            retryable: true
            assetId: ast_existing_123
            versionId: ver_01JQ9YG2PGM4H7QPQY5C8D6BBN
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
